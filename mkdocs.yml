site_name: Projeto ED SATC
site_description: Documentação técnica do Data Lakehouse para o ERP de oficina mecânica GearLog.
site_author: Equipe Projeto ED SATC
use_directory_urls: false
repo_name: frank-cardoso/projeto-ed-satc
repo_url: https://github.com/frank-cardoso/projeto-ed-satc
edit_uri: edit/main/docs/

theme:
  name: material
  language: pt-BR
  logo: assets/images/logo.svg
  favicon: assets/images/logo.svg
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.action.edit
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Usar tema escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Usar tema claro

nav:
  - Início: index.md
  - Projeto:
      - Visão geral: projeto.md
      - Arquitetura: arquitetura.md
      - Modelo de dados: modelo-dados.md
  - Pipeline:
      - Processamento por camada: pipeline.md
      - Orquestração com Airflow: orquestracao.md
  - Operação:
      - Configuração: configuracao.md
      - Execução local: execucao.md
      - Dashboard analítico: dashboard.md
      - Power BI e consumo: powerbi.md
  - Desenvolvimento:
      - Qualidade e limitações: qualidade-limitacoes.md
      - Referência do repositório: referencia.md
      - Código dos jobs: codigo.md
      - Guia de contribuição: contribuicao.md

plugins:
  - search:
      lang: pt
  - mkdocs-jupyter:
      execute: false
      include_source: true
      include:
        - "*.ipynb"
        - "*.py"
      ignore:
        - "**/.ipynb_checkpoints/**"
      no_prompt: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: .
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js

copyright: Projeto ED SATC — documentação do ambiente acadêmico de Engenharia de Dados
