<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Print do dashboard de consumo da camada Gold</title>
  <desc id="desc">Dashboard tecnico mostrando tabelas Gold, chaves substitutas, metricas operacionais e caminho de consumo pelo Metabase.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f7fb"/>
      <stop offset="100%" stop-color="#e8f8fb"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5b3f96"/>
      <stop offset="100%" stop-color="#00a9b7"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#1b1233" flood-opacity="0.16"/>
    </filter>
    <style>
      .panel { fill: #ffffff; stroke: #dde3ee; stroke-width: 1; filter: url(#shadow); }
      .soft { fill: #f7f9fd; stroke: #e2e8f2; stroke-width: 1; }
      .title { fill: #1b1930; font-family: Inter, Segoe UI, Arial, sans-serif; }
      .muted { fill: #64708a; font-family: Inter, Segoe UI, Arial, sans-serif; }
      .purple { fill: #5b3f96; }
      .cyan { fill: #00a9b7; }
      .green { fill: #19a974; }
      .line { stroke: #98a5bd; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#98a5bd"/>
    </marker>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect x="46" y="36" width="1348" height="828" rx="34" fill="#ffffff" opacity="0.66"/>

  <g transform="translate(84 72)">
    <rect width="1272" height="84" rx="24" fill="url(#accent)"/>
    <text x="32" y="39" class="title" fill="#ffffff" font-size="28" font-weight="800">Camada Gold · Consumo analítico</text>
    <text x="32" y="65" fill="#e7fbff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Modelo dimensional, tabelas de apoio e métricas exibidas no dashboard</text>
    <rect x="1040" y="23" width="184" height="38" rx="19" fill="rgba(255,255,255,0.18)" stroke="rgba(255,255,255,0.35)"/>
    <text x="1064" y="48" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Metabase / BI</text>
  </g>

  <g transform="translate(84 196)">
    <rect class="panel" width="378" height="248" rx="24"/>
    <text x="28" y="42" class="title" font-size="21" font-weight="800">fato_ordens_servico</text>
    <text x="28" y="68" class="muted" font-size="13">Grão: uma ordem de serviço</text>
    <g transform="translate(28 96)">
      <rect class="soft" width="322" height="34" rx="11"/><text x="18" y="22" class="muted" font-size="14">ID_ORDEM_SERVICO</text>
      <rect y="44" class="soft" width="322" height="34" rx="11"/><text x="18" y="66" class="muted" font-size="14">SK_DIM_MECANICO</text>
      <rect y="88" class="soft" width="322" height="34" rx="11"/><text x="18" y="110" class="muted" font-size="14">SK_DIM_VEICULO</text>
      <rect y="132" class="soft" width="322" height="34" rx="11"/><text x="18" y="154" class="muted" font-size="14">DT_PROCESSAMENTO_SILVER</text>
    </g>
  </g>

  <g transform="translate(536 196)">
    <rect class="panel" width="378" height="248" rx="24"/>
    <text x="28" y="42" class="title" font-size="21" font-weight="800">Dimensões SCD Tipo 2</text>
    <text x="28" y="68" class="muted" font-size="13">Histórico por chave natural e validade</text>
    <g transform="translate(28 96)">
      <rect class="soft" width="322" height="34" rx="11"/><text x="18" y="22" class="muted" font-size="14">dim_mecanico · sk · flag_ativo</text>
      <rect y="44" class="soft" width="322" height="34" rx="11"/><text x="18" y="66" class="muted" font-size="14">dim_veiculo · sk · flag_ativo</text>
      <rect y="88" class="soft" width="322" height="34" rx="11"/><text x="18" y="110" class="muted" font-size="14">dim_cliente · historizada</text>
      <rect y="132" class="soft" width="322" height="34" rx="11"/><text x="18" y="154" class="muted" font-size="14">dim_peca · dim_fornecedor</text>
    </g>
  </g>

  <g transform="translate(988 196)">
    <rect class="panel" width="368" height="248" rx="24"/>
    <text x="28" y="42" class="title" font-size="21" font-weight="800">Indicadores derivados</text>
    <text x="28" y="68" class="muted" font-size="13">Camada de visualização do dashboard</text>
    <g transform="translate(28 100)">
      <circle cx="24" cy="24" r="22" fill="#eef6ff"/><text x="17" y="32" class="cyan" font-size="22" font-weight="800">1</text><text x="62" y="30" class="muted" font-size="15">Volume de ordens</text>
      <circle cx="24" cy="76" r="22" fill="#f2edff"/><text x="17" y="84" class="purple" font-size="22" font-weight="800">2</text><text x="62" y="82" class="muted" font-size="15">Produtividade por mecânico</text>
      <circle cx="24" cy="128" r="22" fill="#edf9f3"/><text x="17" y="136" class="green" font-size="22" font-weight="800">3</text><text x="62" y="134" class="muted" font-size="15">Uso por veículo e histórico</text>
    </g>
  </g>

  <path class="line" d="M462 320 C500 320 498 320 536 320"/>
  <path class="line" d="M914 320 C952 320 950 320 988 320"/>

  <g transform="translate(84 494)">
    <rect class="panel" width="608" height="314" rx="24"/>
    <text x="28" y="42" class="title" font-size="21" font-weight="800">Qualidade da carga Gold</text>
    <text x="28" y="68" class="muted" font-size="13">Sinais acompanhados na operação</text>
    <g transform="translate(34 106)">
      <text x="0" y="18" class="muted" font-size="14">Dimensões processadas</text>
      <rect x="0" y="32" width="520" height="18" rx="9" fill="#edf1f7"/><rect x="0" y="32" width="520" height="18" rx="9" fill="#00a9b7"/>
      <text x="0" y="84" class="muted" font-size="14">Fato materializada</text>
      <rect x="0" y="98" width="520" height="18" rx="9" fill="#edf1f7"/><rect x="0" y="98" width="486" height="18" rx="9" fill="#5b3f96"/>
      <text x="0" y="150" class="muted" font-size="14">Cobertura de chaves substitutas</text>
      <rect x="0" y="164" width="520" height="18" rx="9" fill="#edf1f7"/><rect x="0" y="164" width="404" height="18" rx="9" fill="#19a974"/>
    </g>
    <text x="34" y="278" class="muted" font-size="13">Observação: pagamentos e valores financeiros ainda dependem de enriquecimento futuro da fato.</text>
  </g>

  <g transform="translate(730 494)">
    <rect class="panel" width="626" height="314" rx="24"/>
    <text x="28" y="42" class="title" font-size="21" font-weight="800">Caminho de publicação</text>
    <text x="28" y="68" class="muted" font-size="13">Fluxo esperado entre storage analítico e BI</text>
    <g transform="translate(42 112)">
      <rect class="soft" x="0" y="0" width="142" height="70" rx="18"/><text x="30" y="31" class="title" font-size="16" font-weight="750">Gold</text><text x="24" y="52" class="muted" font-size="12">Delta / Parquet</text>
      <rect class="soft" x="212" y="0" width="142" height="70" rx="18"/><text x="238" y="31" class="title" font-size="16" font-weight="750">DuckDB</text><text x="236" y="52" class="muted" font-size="12">MotherDuck</text>
      <rect class="soft" x="424" y="0" width="142" height="70" rx="18"/><text x="454" y="31" class="title" font-size="16" font-weight="750">Metabase</text><text x="452" y="52" class="muted" font-size="12">Dashboard</text>
      <path class="line" d="M148 35 L204 35"/>
      <path class="line" d="M360 35 L416 35"/>
    </g>
    <g transform="translate(42 224)">
      <rect width="542" height="48" rx="16" fill="#fff8e8" stroke="#f1d89b"/>
      <text x="20" y="30" fill="#936c00" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14">Pendente no código: job versionado de sincronização Gold → MotherDuck.</text>
    </g>
  </g>
</svg>
