<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Print do dashboard operacional GearLog</title>
  <desc id="desc">Dashboard analitico com indicadores de ordens de servico, status, evolucao mensal, ranking de mecanicos e alertas.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#17142b"/>
      <stop offset="100%" stop-color="#0f2740"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c4dff"/>
      <stop offset="100%" stop-color="#00c2d1"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .panel { fill: #201d36; stroke: rgba(255,255,255,0.08); stroke-width: 1; filter: url(#shadow); }
      .panel-soft { fill: #252241; stroke: rgba(255,255,255,0.08); stroke-width: 1; }
      .muted { fill: #a8b3cf; font-family: Inter, Segoe UI, Arial, sans-serif; }
      .text { fill: #f7f8ff; font-family: Inter, Segoe UI, Arial, sans-serif; }
      .cyan { fill: #00c2d1; }
      .purple { fill: #9d7cff; }
      .green { fill: #42d392; }
      .yellow { fill: #ffd166; }
      .red { fill: #ff6b6b; }
      .line { stroke: #00c2d1; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .grid { stroke: rgba(255,255,255,0.08); stroke-width: 1; }
    </style>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect x="44" y="34" width="1352" height="832" rx="34" fill="#151329" stroke="rgba(255,255,255,0.08)"/>

  <g transform="translate(80 70)">
    <rect width="1280" height="86" rx="24" fill="#1f1b38"/>
    <circle cx="40" cy="43" r="18" fill="url(#accent)"/>
    <text x="75" y="38" class="text" font-size="28" font-weight="800">GearLog ERP · Dashboard Operacional</text>
    <text x="75" y="66" class="muted" font-size="15">Metabase · camada Gold · ordens de serviço e performance da oficina</text>
    <rect x="1058" y="24" width="178" height="38" rx="19" fill="#252241" stroke="rgba(255,255,255,0.1)"/>
    <text x="1083" y="49" class="muted" font-size="14">Última carga: diária</text>
  </g>

  <g transform="translate(80 190)">
    <rect class="panel" width="292" height="132" rx="24"/>
    <text x="28" y="42" class="muted" font-size="15">Ordens no período</text>
    <text x="28" y="92" class="text" font-size="42" font-weight="800">1.284</text>
    <text x="188" y="92" class="green" font-size="16" font-weight="700">+12%</text>
  </g>
  <g transform="translate(410 190)">
    <rect class="panel" width="292" height="132" rx="24"/>
    <text x="28" y="42" class="muted" font-size="15">Tempo médio</text>
    <text x="28" y="92" class="text" font-size="42" font-weight="800">3,8h</text>
    <text x="178" y="92" class="cyan" font-size="16" font-weight="700">SLA</text>
  </g>
  <g transform="translate(740 190)">
    <rect class="panel" width="292" height="132" rx="24"/>
    <text x="28" y="42" class="muted" font-size="15">Veículos atendidos</text>
    <text x="28" y="92" class="text" font-size="42" font-weight="800">742</text>
    <text x="158" y="92" class="purple" font-size="16" font-weight="700">ativos</text>
  </g>
  <g transform="translate(1070 190)">
    <rect class="panel" width="292" height="132" rx="24"/>
    <text x="28" y="42" class="muted" font-size="15">Peças críticas</text>
    <text x="28" y="92" class="text" font-size="42" font-weight="800">18</text>
    <text x="108" y="92" class="yellow" font-size="16" font-weight="700">estoque baixo</text>
  </g>

  <g transform="translate(80 352)">
    <rect class="panel" width="612" height="248" rx="24"/>
    <text x="28" y="42" class="text" font-size="20" font-weight="750">Ordens por status</text>
    <text x="28" y="67" class="muted" font-size="13">Visão consolidada da fato de ordens de serviço</text>
    <g transform="translate(34 100)">
      <circle cx="82" cy="70" r="64" fill="none" stroke="#00c2d1" stroke-width="34" stroke-dasharray="245 402" transform="rotate(-90 82 70)"/>
      <circle cx="82" cy="70" r="64" fill="none" stroke="#9d7cff" stroke-width="34" stroke-dasharray="86 402" stroke-dashoffset="-245" transform="rotate(-90 82 70)"/>
      <circle cx="82" cy="70" r="64" fill="none" stroke="#ffd166" stroke-width="34" stroke-dasharray="52 402" stroke-dashoffset="-331" transform="rotate(-90 82 70)"/>
      <circle cx="82" cy="70" r="64" fill="none" stroke="#ff6b6b" stroke-width="34" stroke-dasharray="19 402" stroke-dashoffset="-383" transform="rotate(-90 82 70)"/>
      <text x="59" y="66" class="text" font-size="26" font-weight="800">84%</text>
      <text x="48" y="88" class="muted" font-size="12">concluídas</text>
    </g>
    <g transform="translate(250 98)">
      <rect x="0" y="0" width="18" height="18" rx="5" fill="#00c2d1"/><text x="32" y="15" class="muted" font-size="15">Concluídas · 84%</text>
      <rect x="0" y="42" width="18" height="18" rx="5" fill="#9d7cff"/><text x="32" y="57" class="muted" font-size="15">Em execução · 10%</text>
      <rect x="0" y="84" width="18" height="18" rx="5" fill="#ffd166"/><text x="32" y="99" class="muted" font-size="15">Aguardando peça · 5%</text>
      <rect x="0" y="126" width="18" height="18" rx="5" fill="#ff6b6b"/><text x="32" y="141" class="muted" font-size="15">Canceladas · 1%</text>
    </g>
  </g>

  <g transform="translate(730 352)">
    <rect class="panel" width="632" height="248" rx="24"/>
    <text x="28" y="42" class="text" font-size="20" font-weight="750">Evolução mensal de ordens</text>
    <text x="28" y="67" class="muted" font-size="13">Tendência para acompanhamento de demanda</text>
    <g transform="translate(40 92)">
      <line x1="0" y1="118" x2="548" y2="118" class="grid"/>
      <line x1="0" y1="82" x2="548" y2="82" class="grid"/>
      <line x1="0" y1="46" x2="548" y2="46" class="grid"/>
      <polyline class="line" points="0,110 70,88 140,98 210,64 280,72 350,38 420,52 490,26 548,34"/>
      <g fill="#00c2d1">
        <circle cx="0" cy="110" r="6"/><circle cx="70" cy="88" r="6"/><circle cx="140" cy="98" r="6"/><circle cx="210" cy="64" r="6"/>
        <circle cx="280" cy="72" r="6"/><circle cx="350" cy="38" r="6"/><circle cx="420" cy="52" r="6"/><circle cx="490" cy="26" r="6"/><circle cx="548" cy="34" r="6"/>
      </g>
      <text x="0" y="154" class="muted" font-size="12">Jan</text><text x="136" y="154" class="muted" font-size="12">Mar</text><text x="276" y="154" class="muted" font-size="12">Mai</text><text x="416" y="154" class="muted" font-size="12">Jul</text><text x="532" y="154" class="muted" font-size="12">Set</text>
    </g>
  </g>

  <g transform="translate(80 632)">
    <rect class="panel" width="612" height="198" rx="24"/>
    <text x="28" y="42" class="text" font-size="20" font-weight="750">Ranking por mecânico</text>
    <g transform="translate(28 76)">
      <text x="0" y="20" class="muted" font-size="14">Carlos</text><rect x="90" y="3" width="430" height="18" rx="9" fill="#00c2d1"/><text x="535" y="20" class="text" font-size="14">326</text>
      <text x="0" y="58" class="muted" font-size="14">Marina</text><rect x="90" y="41" width="342" height="18" rx="9" fill="#9d7cff"/><text x="535" y="58" class="text" font-size="14">259</text>
      <text x="0" y="96" class="muted" font-size="14">Rafael</text><rect x="90" y="79" width="288" height="18" rx="9" fill="#42d392"/><text x="535" y="96" class="text" font-size="14">218</text>
    </g>
  </g>

  <g transform="translate(730 632)">
    <rect class="panel" width="632" height="198" rx="24"/>
    <text x="28" y="42" class="text" font-size="20" font-weight="750">Alertas e oportunidades</text>
    <g transform="translate(28 72)">
      <rect class="panel-soft" width="576" height="34" rx="12"/><circle cx="19" cy="17" r="7" fill="#ffd166"/><text x="40" y="22" class="muted" font-size="14">18 peças abaixo do estoque mínimo na dimensão de peças</text>
      <rect y="48" class="panel-soft" width="576" height="34" rx="12"/><circle cx="19" cy="65" r="7" fill="#00c2d1"/><text x="40" y="70" class="muted" font-size="14">SLA médio estável em 3,8h nas últimas cargas</text>
      <rect y="96" class="panel-soft" width="576" height="34" rx="12"/><circle cx="19" cy="113" r="7" fill="#9d7cff"/><text x="40" y="118" class="muted" font-size="14">Modelo Gold pronto para enriquecer análises financeiras</text>
    </g>
  </g>
</svg>
