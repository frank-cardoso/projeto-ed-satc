version: '3.8'

services:
  metabase:
    build: 
      context: .
      dockerfile: Dockerfile.metabase
    container_name: metabase
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      MB_ENCRYPTION_SECRET_KEY: ${MB_ENCRYPTION_SECRET_KEY:-changeme-secret-key-change-in-production}
      JAVA_OPTS: -Xmx2g
    volumes:
      - ./metabase-data:/metabase-data
      - ./plugins:/plugins
    networks:
      - data-lake-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 20s
      retries: 5

networks:
  data-lake-network:
    driver: bridge